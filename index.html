<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة تسليم المرضى - Patient Handover Map</title>
    
    <!-- FontAwesome Icons & Cairo Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- html2canvas for image export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --color-men: #800020;       /* حنائي / رجالي */
            --color-women: #7e22ce;     /* بنفسجي / نسائي */
            --color-med-icu: #dc2626;   /* أحمر / عناية باطنية */
            --color-surg-icu: #0f172a;  /* زرق غامق جداً / عناية جراحية */
            --bg-body: #f8fafc;
        }

        /* كود برمجى ذكي لإخفاء أي عناوين أو كتابات زرقاء قديمة تعود لقالب المنصة */
        h1:first-of-type:not(.hospital-header h1), 
        body > a, 
        .markdown-body h1:first-child {
            display: none !important;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background-color: var(--bg-body); color: #1e293b; direction: rtl; text-align: right; }

        .controls-card {
            max-width: 1100px;
            margin: 20px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-primary { background-color: #2563eb; }
        .btn-success { background-color: #16a34a; }
        .btn-share { background-color: #0284c7; padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; margin-top: 5px; color: white; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }

        /* هيكل الخريطة للطباعة */
        .handover-container {
            max-width: 1100px;
            margin: 0 auto 30px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .hospital-header {
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .hospital-header h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            color: #0f172a;
        }

        .hospital-header p {
            margin: 3px 0;
            font-size: 0.9rem;
            color: #64748b;
        }

        .wards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .ward-box {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            background: #fff;
        }

        .ward-title {
            font-size: 1.1rem;
            font-weight: 700;
            padding-bottom: 8px;
            margin-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ألوان العناوين حسب القسم */
        .ward-men .ward-title { color: var(--color-men); border-color: var(--color-men); }
        .ward-women .ward-title { color: var(--color-women); border-color: var(--color-women); }
        .ward-med-icu .ward-title { color: var(--color-med-icu); border-color: var(--color-med-icu); }
        .ward-surg-icu .ward-title { color: var(--color-surg-icu); border-color: var(--color-surg-icu); }

        .patient-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .patient-card .p-name { font-weight: 700; color: #0f172a; font-size: 0.95rem; margin-bottom: 4px; }
        .patient-card .p-notes { color: #dc2626; font-weight: 600; background: #fee2e2; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }

        @media print {
            body { background: #fff; }
            .controls-card { display: none; }
            .btn-share { background-color: #f1f5f9 !important; color: #0284c7 !important; border: 1px solid #bae6fd !important; }
            .handover-container { box-shadow: none; padding: 0; margin: 0; width: 100%; max-width: none; }
            .wards-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .ward-box { break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="controls-card">
        <h3>إدارة خريطة المرضى</h3>
        <div class="inputs-grid">
            <div class="input-group">
                <label>اسم المريض</label>
                <input type="text" id="patientName" placeholder="أدخل اسم المريض">
            </div>
            <div class="input-group">
                <label>الرقم / السرير</label>
                <input type="text" id="patientBed" placeholder="رقم السرير أو التشخيص">
            </div>
            <div class="input-group">
                <label>القسم</label>
                <select id="wardSelect">
                    <option value="ward-men">ردهة الرجال</option>
                    <option value="ward-women">ردهة النساء</option>
                    <option value="ward-med-icu">عناية باطنية (ICU)</option>
                    <option value="ward-surg-icu">عناية جراحية (ICU)</option>
                </select>
            </div>
            <div class="input-group">
                <label>ملاحظات حرجة / Handover</label>
                <input type="text" id="patientNotes" placeholder="الملاحظات الطبية المهمة">
            </div>
        </div>
        <div class="btn-container">
            <button class="btn btn-primary" onclick="addPatient()"><i class="fa-solid fa-plus"></i> إضافة مريض</button>
            <button class="btn btn-success" onclick="window.print()"><i class="fa-solid fa-print"></i> طباعة / حفظ PDF</button>
        </div>
    </div>

    <div class="handover-container" id="printArea">
        <div class="hospital-header">
            <h1>خريطة تسليم وتسلم المرضى - Hospital Handover</h1>
            <p id="currentDate">التاريخ: -</p>
        </div>

        <div class="wards-grid">
            <!-- ردهة الرجال -->
            <div class="ward-box ward-men" id="list-ward-men">
                <div class="ward-title"><span>ردهة الرجال (Men Ward)</span><i class="fa-solid fa-bed"></i></div>
            </div>
            <!-- ردهة النساء -->
            <div class="ward-box ward-women" id="list-ward-women">
                <div class="ward-title"><span>ردهة النساء (Women Ward)</span><i class="fa-solid fa-bed"></i></div>
            </div>
            <!-- عناية باطنية -->
            <div class="ward-box ward-med-icu" id="list-ward-med-icu">
                <div class="ward-title"><span>عناية باطنية (Medical ICU)</span><i class="fa-solid fa-heart-pulse"></i></div>
            </div>
            <!-- عناية جراحية -->
            <div class="ward-box ward-surg-icu" id="list-ward-surg-icu">
                <div class="ward-title"><span>عناية جراحية (Surgical ICU)</span><i class="fa-solid fa-shield-heart"></i></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').innerText = 'التاريخ: ' + new Date().toLocaleDateString('ar-IQ');

        function addPatient() {
            const name = document.getElementById('patientName').value.trim();
            const bed = document.getElementById('patientBed').value.trim();
            const wardId = document.getElementById('wardSelect').value;
            const notes = document.getElementById('patientNotes').value.trim();

            if(!name) {
                alert('يرجى إدخال اسم المريض على الأقل');
                return;
            }

            const wardContainer = document.getElementById('list-' + wardId);

            const card = document.createElement('div');
            card.className = 'patient-card';
            
            const shareText = `تسليم مريض:\nالاسم: ${name}\nالسرير/التشخيص: ${bed}\nالملاحظات: ${notes || 'لا توجد ملاحظات'}`;

            card.innerHTML = `
                <div class="p-name">${name} - <span style="font-size:0.8rem; color:#64748b;">${bed}</span></div>
                <div class="p-notes">${notes || 'لا توجد ملاحظات خاصة'}</div>
                <div>
                    <button class="btn btn-share" onclick="sharePatient('${encodeURIComponent(shareText)}')">
                        <i class="fa-solid fa-share-nodes"></i> مشاركة
                    </button>
                </div>
            `;

            wardContainer.appendChild(card);

            document.getElementById('patientName').value = '';
            document.getElementById('patientBed').value = '';
            document.getElementById('patientNotes').value = '';
        }

        function sharePatient(text) {
            const decodedText = decodeURIComponent(text);
            if (navigator.share) {
                navigator.share({
                    title: 'تسليم مريض',
                    text: decodedText
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(decodedText);
                alert('تم نسخ تفاصيل المريض بنجاح!');
            }
        }
    </script>
</body>
</html>
